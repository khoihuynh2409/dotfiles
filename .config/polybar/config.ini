[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880


[bar/mybar]
width = 100%
height = 24pt
radius = 0

tray-position = right
tray-padding = 0
tray-maxsize = 25

fixed-center = true

underline-size = 3
line-size = 2pt
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin-left = 1
module-margin-right = 1

separator = " "
separator-foreground = ${colors.disabled}

font-0 = Fira Code Nerd Font:style=Regular:size=13;2
font-1 = "Iosevka Nerd Font:size=13;3"

modules-left = xworkspaces
modules-center = date
modules-right = filesystem pulseaudio battery memory wlan

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %mountpoint%%{F-} %free%

label-mounted-underline = #83a598

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
full-at = 100
low-at = 15
battery = BAT1
adapter = ADP1

label-charging = Char %percentage%%
label-discharging = Dischr %percentage%%
label-low = LowBat %percentage%%
label-full = Full %percentage%%

label-low-foreground = ${color.alert}

format-charging = <label-charging>
format-discharging = <label-discharging>
format-low = <label-low>
format-full = <label-full>

format-charging-underline = #98971A
format-discharging-underline = #B16286
format-low-underline = #CC241D
format-full-underline = #b8bb26

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "Vol "
format-volume = <label-volume>

format-volume-underline = #8ABEB7
format-muted-underline = #3C3836

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-prefix-foreground = ${colors.primary}
label = Mem %gb_used%

format-underline = #8EC07C

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>

[module/wlan]
inherit = network-base
interface-type = wireless

label-connected = %essid%
label-disconnected = disconnect
label-disconnected-foreground = ${color.disabled}

format-connected-underline = #928374
format-disconnected-underline = #3C3836

#[module/eth]
#inherit = network-base
#interface-type = wired
#label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %d-%m-%Y - %H:%M

label = %date%
label-foreground = ${colors.primary}

label-underline = #689D6A

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
